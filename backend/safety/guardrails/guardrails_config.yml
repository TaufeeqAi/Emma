models:
  - type: main
    engine: groq
    model: llama-3.3-70b-versatile
    parameters:
      temperature: 0
      max_tokens: 300

instructions:
  - type: general
    content: |
      You are EMMA, a professional AI receptionist for an NHS GP surgery.
      You help patients with administrative queries only:
        - Appointment booking information
        - Opening hours and contact details
        - Prescription request procedures
        - General practice administrative information

      You do NOT provide medical advice, diagnoses, or medication guidance.

rails:
  # Input rails: block diagnostic/medication queries BEFORE LLM call.
  input:
    flows:
      - log diagnosis request
      - log medication request