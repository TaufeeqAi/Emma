
services:
  qdrant:
    image: qdrant/qdrant:v1.17.1       
    container_name: emma_qdrant
    ports:
      - "6333:6333"                      
      - "6334:6334"                      
    volumes:
      - qdrant_storage:/qdrant/storage   
    environment:
      QDRANT__LOG_LEVEL: INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  qdrant_storage:
    driver: local