# LiveKit server configuration 

port: 7880
bind_addresses:
  - ""

rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 60000
  stun_servers:
    - stun.l.google.com:19302
    - stun1.l.google.com:19302
  use_ice_lite: false

# Redis — required for multi-node and SIP
redis:
  address: redis:6379

webhook:
  urls:
    - http://host.docker.internal:8000/livekit-webhook
  api_key: devkey

logging:
  level: info
  json: false

# Prometheus metrics — updated syntax for v1.7.2
prometheus:
  port: 6789